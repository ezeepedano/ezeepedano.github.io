{% extends 'base.html' %}

{% block title %}Registrar Gasto General - Propel{% endblock %}
{% block header_title %}Registrar Compra{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <!-- Minimal Breadcrumb / Back Navigation (Matches Stock Form) -->
    <div class="mb-6 flex items-center justify-between">
        <a href="{% url 'traceability:purchase_list' %}" class="flex items-center text-gray-500 hover:text-gray-800 transition-colors font-medium">
            <i class="fas fa-arrow-left mr-2"></i> Volver
        </a>
        <span class="text-sm font-bold text-gray-300">GASTOS GENERALES</span>
    </div>

    <!-- Premium Card -->
    <div class="bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-gray-100 relative">
        <!-- Decorative Top Bar -->
        <div class="h-2 bg-gradient-to-r from-purple-400 via-fuchsia-500 to-pink-500"></div>

        <div class="p-8 md:p-10">
            <!-- Header inside the card -->
            <div class="flex items-start justify-between mb-10">
                <div>
                    <h1 class="text-3xl font-black text-gray-900 tracking-tight mb-2">Registrar Gasto</h1>
                    <p class="text-gray-500 font-medium text-lg">Servicios, Alquileres, Librería, etc.</p>
                </div>
                <div class="hidden md:flex bg-purple-50 text-purple-600 w-16 h-16 rounded-2xl items-center justify-center text-2xl shadow-inner">
                    <i class="fas fa-file-invoice-dollar"></i>
                </div>
            </div>

            <form method="post" class="space-y-8">
                {% csrf_token %}

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <!-- Date -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Fecha</label>
                         <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-calendar-day text-gray-400 group-focus-within:text-purple-500 transition-colors"></i>
                            </div>
                            <input type="date" name="date" value="{% now 'Y-m-d' %}" required
                             class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-purple-500/10 focus:border-purple-500 transition-all font-bold text-gray-800 shadow-sm">
                        </div>
                    </div>

                    <!-- Amount -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Monto Total</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-dollar-sign text-gray-400 group-focus-within:text-purple-500 transition-colors"></i>
                            </div>
                            <input type="number" step="0.01" name="amount" required placeholder="0.00"
                                class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-purple-500/10 focus:border-purple-500 transition-all font-bold text-gray-800 placeholder-gray-300 shadow-sm">
                        </div>
                    </div>

                     <!-- Provider -->
                     <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Proveedor</label>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <!-- Select Existing -->
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i class="fas fa-store text-gray-400 group-focus-within:text-purple-500 transition-colors"></i>
                                </div>
                                <select name="provider"
                                    class="w-full pl-11 pr-10 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-purple-500/10 focus:border-purple-500 transition-all appearance-none font-medium text-gray-700 shadow-sm cursor-pointer">
                                    <option value="">-- Seleccionar Existente --</option>
                                    {% for p in form.fields.provider.queryset %}
                                    <option value="{{ p.id }}">{{ p.name }}</option>
                                    {% endfor %}
                                </select>
                                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                                    <i class="fas fa-chevron-down text-gray-400"></i>
                                </div>
                            </div>
                            
                            <!-- Or Create New (Simple text input, logic in view handles creation) -->
                            <div class="relative group">
                                <input type="text" name="provider_name" placeholder="O Nuevo Proveedor..."
                                class="w-full px-4 py-3 bg-white border border-dashed border-gray-300 rounded-xl focus:outline-none focus:ring-4 focus:ring-purple-500/10 focus:border-purple-500 transition-all font-medium text-gray-700 placeholder-gray-400 shadow-sm">
                            </div>
                        </div>
                     </div>

                     <!-- Category -->
                     <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Categoría</label>
                        <select name="category"
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-purple-500/10 focus:border-purple-500 transition-all font-medium text-gray-700 shadow-sm">
                            <option value="">(Sin Categoría)</option>
                            {% for c in form.fields.category.queryset %}
                            <option value="{{ c.id }}">{{ c.name }}</option>
                            {% endfor %}
                        </select>
                     </div>

                      <!-- Payment Status -->
                      <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Estado del Pago</label>
                        <div class="flex gap-2 p-1 bg-gray-50 border border-gray-200 rounded-xl">
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="payment_status" value="PENDING" checked class="peer sr-only">
                                <div class="text-center py-2 rounded-lg text-xs font-bold text-gray-400 peer-checked:bg-white peer-checked:text-red-600 peer-checked:shadow-sm transition-all">
                                    Pendiente
                                </div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="payment_status" value="PARTIAL" class="peer sr-only">
                                <div class="text-center py-2 rounded-lg text-xs font-bold text-gray-400 peer-checked:bg-white peer-checked:text-orange-600 peer-checked:shadow-sm transition-all">
                                    Parcial
                                </div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="payment_status" value="PAID" class="peer sr-only">
                                <div class="text-center py-2 rounded-lg text-xs font-bold text-gray-400 peer-checked:bg-white peer-checked:text-green-600 peer-checked:shadow-sm transition-all">
                                    Pagado
                                </div>
                            </label>
                        </div>
                     </div>

                     <!-- Description -->
                     <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Descripción / Detalle</label>
                        <textarea name="description" rows="3" placeholder="Ej: Factura de luz Enero..."
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-purple-500/10 focus:border-purple-500 transition-all font-medium text-gray-700 placeholder-gray-400 shadow-sm"></textarea>
                     </div>

                     <!-- Due Date -->
                     <div>
                         <label class="block text-sm font-bold text-gray-700 mb-2">Vencimiento <span class="text-gray-400 font-normal">(Si aplica)</span></label>
                         <input type="date" name="due_date" 
                             class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-purple-500/10 focus:border-purple-500 transition-all font-medium text-gray-700 shadow-sm">
                     </div>

                </div>

                <!-- Actions -->
                <div class="pt-6 border-t border-gray-100 flex items-center justify-end gap-4">
                    <a href="{% url 'traceability:purchase_list' %}" class="px-6 py-4 rounded-xl text-gray-500 font-bold hover:bg-gray-50 hover:text-gray-800 transition-colors">
                        Cancelar
                    </a>
                    <button type="submit" class="px-8 py-4 bg-purple-600 hover:bg-purple-700 text-white rounded-xl font-bold shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all flex items-center">
                        <i class="fas fa-check-circle mr-2"></i> Guardar Gasto
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
