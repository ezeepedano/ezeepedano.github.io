{% extends 'base.html' %}

{% block title %}Registrar Activo Fijo - Propel{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <!-- Minimal Breadcrumb / Back Navigation (Matches Stock Form) -->
    <div class="mb-6 flex items-center justify-between">
        <a href="{% url 'purchase_hub' %}" class="flex items-center text-gray-500 hover:text-gray-800 transition-colors font-medium">
            <i class="fas fa-arrow-left mr-2"></i> Volver
        </a>
        <span class="text-sm font-bold text-gray-300">ACTIVOS FIJOS</span>
    </div>

    <!-- Premium Card -->
    <div class="bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-gray-100 relative">
        <!-- Decorative Top Bar -->
        <div class="h-2 bg-gradient-to-r from-blue-400 via-cyan-500 to-teal-500"></div>

        <div class="p-8 md:p-10">
            <!-- Header inside the card -->
            <div class="flex items-start justify-between mb-10">
                <div>
                    <h1 class="text-3xl font-black text-gray-900 tracking-tight mb-2">Registrar Activo</h1>
                    <p class="text-gray-500 font-medium text-lg">Maquinaria, Equipos, Muebles y Rodados</p>
                </div>
                <div class="hidden md:flex bg-blue-50 text-blue-600 w-16 h-16 rounded-2xl items-center justify-center text-2xl shadow-inner">
                    <i class="fas fa-truck-pickup"></i>
                </div>
            </div>

            <form method="post" class="space-y-8">
                {% csrf_token %}

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <!-- Name -->
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Nombre del Bien</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-tag text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                            </div>
                            <input type="text" name="name" value="{{ asset.name|default:'' }}" required placeholder="Ej: Amasadora Industrial 50kg"
                                class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-bold text-gray-800 placeholder-gray-300 shadow-sm">
                        </div>
                    </div>

                    <!-- Date -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Fecha de Compra</label>
                         <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-calendar-day text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                            </div>
                            <input type="date" name="purchase_date" value="{{ asset.purchase_date|default:today|date:'Y-m-d' }}" required
                             class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-bold text-gray-800 shadow-sm">
                        </div>
                    </div>

                     <!-- Cost -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Costo Unitario</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-dollar-sign text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                            </div>
                            <input type="number" step="0.01" name="cost" value="{{ asset.cost|stringformat:'.2f' }}" required placeholder="0.00"
                                class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-bold text-gray-800 placeholder-gray-300 shadow-sm">
                        </div>
                    </div>

                     <!-- Provider -->
                     <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Proveedor</label>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <!-- Select Existing -->
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i class="fas fa-store text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                                </div>
                                <select name="provider"
                                    class="w-full pl-11 pr-10 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all appearance-none font-medium text-gray-700 shadow-sm cursor-pointer">
                                    <option value="">-- Seleccionar Existente --</option>
                                    {% for p in providers %}
                                    <option value="{{ p.id }}" {% if asset.provider_id == p.id %}selected{% endif %}>{{ p.name }}</option>
                                    {% endfor %}
                                </select>
                                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                                    <i class="fas fa-chevron-down text-gray-400"></i>
                                </div>
                            </div>
                            
                            <!-- Or Create New -->
                            <div class="relative group">
                                <input type="text" name="provider_name" placeholder="O Nuevo Proveedor..."
                                class="w-full px-4 py-3 bg-white border border-dashed border-gray-300 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-medium text-gray-700 placeholder-gray-400 shadow-sm">
                            </div>
                        </div>
                     </div>

                     <!-- Category -->
                     <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Categoría del Bien</label>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <select name="category"
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-medium text-gray-700 shadow-sm">
                                <option value="">(Seleccionar Categoría)</option>
                                {% for c in categories %}
                                <option value="{{ c.id }}" {% if asset.category_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                                {% endfor %}
                                <option value="new">+ Nueva Categoría</option>
                            </select>
                             <input type="text" name="new_category" placeholder="Nombre nueva categoría..."
                                class="w-full px-4 py-3 bg-white border border-dashed border-gray-300 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-medium text-gray-700 placeholder-gray-400 shadow-sm">
                        </div>
                     </div>

                     <!-- Quantity -->
                     <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Cantidad</label>
                        <input type="number" name="quantity" value="{{ asset.quantity|default:1 }}" required min="1"
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-bold text-gray-800 shadow-sm">
                    </div>

                    <!-- Location -->
                     <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Ubicación</label>
                        <input type="text" name="location" value="{{ asset.location|default:'' }}" placeholder="Ej: Planta Alta, Depósito..."
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-medium text-gray-800 shadow-sm">
                    </div>

                     <!-- Description -->
                     <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Descripción / Notas</label>
                        <textarea name="description" rows="3" placeholder="Detalles técnicos, Nro de serie, etc..."
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-medium text-gray-700 placeholder-gray-400 shadow-sm">{{ asset.description|default:'' }}</textarea>
                     </div>

                </div>

                <!-- Actions -->
                <div class="pt-6 border-t border-gray-100 flex items-center justify-end gap-4">
                    <a href="{% url 'purchase_hub' %}" class="px-6 py-4 rounded-xl text-gray-500 font-bold hover:bg-gray-50 hover:text-gray-800 transition-colors">
                        Cancelar
                    </a>
                    <button type="submit" class="px-8 py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all flex items-center">
                        <i class="fas fa-check-circle mr-2"></i> Guardar Activo
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
