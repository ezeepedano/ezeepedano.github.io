{% extends 'base.html' %}
{% block header_title %}Eliminar Ruta{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
        <div class="bg-red-50 p-6 flex flex-col items-center text-center border-b border-red-100">
            <div class="w-16 h-16 bg-red-100 text-red-500 rounded-2xl flex items-center justify-center text-2xl mb-4">
                <i class="fas fa-trash-alt"></i>
            </div>
            <h2 class="text-xl font-black text-gray-900">¿Eliminar Hoja de Ruta?</h2>
            <p class="text-secondary text-sm mt-2">Esta acción no se puede deshacer.</p>
        </div>
        
        <div class="p-8">
            <p class="text-gray-600 mb-6 text-center">
                Estás a punto de eliminar la ruta: <br>
                <span class="font-bold text-gray-900 block mt-2">{{ object }}</span>
                <span class="text-xs text-gray-400 block mt-1">({{ object.stops.count }} paradas asociadas)</span>
            </p>

            <form method="post" class="flex flex-col gap-3">
                {% csrf_token %}
                <button type="submit" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-red-500/30 transition-all transform hover:-translate-y-1">
                    Sí, eliminar ruta
                </button>
                <a href="{% url 'delivery_route_list' %}" class="bg-gray-50 hover:bg-gray-100 text-gray-600 font-bold py-3 px-4 rounded-xl text-center transition-colors">
                    Cancelar
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
