{% extends 'users/base_auth.html' %}

{% block content %}
<h1>Recuperar Contraseña</h1>
<p class="subtitle">Ingresa tu email y te enviaremos las instrucciones.</p>

<form method="post" class="space-y-6">
    {% csrf_token %}

    {% if form.errors %}
    <div class="alert">
        <i class="fas fa-exclamation-circle"></i>
        Email no encontrado o inválido.
    </div>
    {% endif %}

    <div class="input-group">
        <i class="fas fa-envelope input-icon left"></i>
        <input type="email" name="email" id="id_email" required placeholder="yourmail@company.com"
               class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm"
               style="padding: 15px 45px; border-radius: 50px; border: none; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); font-size: 0.95rem; width: 100%;">
    </div>

    <button type="submit" class="btn-login" style="margin-top: 20px;">
        Enviar Instrucciones <i class="fas fa-paper-plane"></i>
    </button>

    <div class="options" style="justify-content: center; margin-top: 20px;">
        <a href="{% url 'login' %}" class="forgot-pass" style="font-weight: 600;">Volver al inicio de sesión</a>
    </div>
</form>
{% endblock %}
